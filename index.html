<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mom Messenger</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #f5f5f0; }
h1 { color: #0f6e56; }
textarea { width: 100%; height: 100px; font-size: 18px; padding: 10px; margin: 10px 0; }
button { background: #0f6e56; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; width: 100%; cursor: pointer; }
#status { margin-top: 15px; padding: 12px; border-radius: 8px; display: none; font-size: 16px; font-weight: bold; }
.ok { background: #eaf3de; color: #3b6d11; }
.err { background: #fcebeb; color: #a32d2d; }
</style>
</head>
<body>
<h1>Mom Messenger</h1>
<textarea id="msg" placeholder="Type a message for Mom..."></textarea>
<button onclick="send()">Send to Echo Show</button>
<div id="status"></div>
<script>
async function send() {
  const text = document.getElementById('msg').value.trim();
  if (!text) return;
  const s = document.getElementById('status');
  s.className = ''; s.style.display = 'block'; s.textContent = 'Sending...';
  try {
    const url = 'https://api-v2.voicemonkey.io/announcement?token=cec0aec7b8f039d62637eb233efe9e27_2955d0091ae49722b6b80f1f5482f3f6&device=echo-kitchen&text=' + encodeURIComponent(text) + '&no_bg=true';
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    s.className = 'ok'; s.textContent = '✅ Delivered!';
    document.getElementById('msg').value = '';
  } catch(e) {
    s.className = 'err'; s.textContent = '❌ Failed: ' + e.message;
  }
}
</script>
</body>
</html>
